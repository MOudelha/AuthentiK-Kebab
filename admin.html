<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin • L'Authentik</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/style.css">
<style>
  :root{--bg:#0c0d10;--surface:#14161b;--card:rgba(255,255,255,.055);--line:rgba(255,255,255,.10);--text:#f7efe1;--muted:#c9bea9;--gold:#eec37b;--gold2:#ffe3b3;--accent:#b23a16;--accent2:#8c260d;}
  body{padding:0;margin:0;}
  
  /* Login */
  .login-screen{position:fixed;inset:0;background:#0c0d10;display:flex;align-items:center;justify-content:center;z-index:9999;}
  .login-box{background:#14161b;border:1px solid rgba(255,255,255,.1);border-radius:26px;padding:2.5rem;width:100%;max-width:400px;text-align:center;}
  .login-box h2{margin:0 0 1.5rem;font-size:1.8rem;letter-spacing:-.04em;}
  .login-box input{width:100%;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:12px;padding:.85rem 1rem;color:#f7efe1;font-family:inherit;font-size:1rem;box-sizing:border-box;margin-bottom:1rem;}
  .login-box button{width:100%;padding:.9rem;border-radius:14px;border:none;background:linear-gradient(180deg,#b23a16,#8c260d);color:#fff;font-weight:900;font-size:1rem;cursor:pointer;font-family:inherit;}
  .login-error{color:#fca5a5;font-size:.88rem;margin-top:.5rem;min-height:1.2rem;}

  /* Layout admin */
  .admin-wrap{max-width:1200px;margin:0 auto;padding:2rem 1rem;}
  .admin-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:2rem;gap:1rem;flex-wrap:wrap;}
  .admin-header h1{margin:0;font-size:2rem;letter-spacing:-.04em;}
  .admin-nav{display:flex;gap:.5rem;flex-wrap:wrap;}
  .tab-btn{padding:.6rem 1.1rem;border-radius:12px;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.05);color:#f7efe1;cursor:pointer;font-weight:700;font-family:inherit;font-size:.9rem;transition:background .15s;}
  .tab-btn.active,.tab-btn:hover{background:linear-gradient(180deg,#b23a16,#8c260d);border-color:transparent;}
  .tab-content{display:none;}
  .tab-content.active{display:block;}

  /* Stats bar */
  .stats-bar{display:grid;grid-template-columns:repeat(4,1fr);gap:1rem;margin-bottom:2rem;}
  .stat-card{background:linear-gradient(180deg,rgba(255,255,255,.055),rgba(255,255,255,.03));border:1px solid rgba(255,255,255,.1);border-radius:20px;padding:1.2rem;text-align:center;}
  .stat-val{font-size:2rem;font-weight:900;color:#eec37b;}
  .stat-label{font-size:.82rem;color:#c9bea9;margin-top:.2rem;}

  /* Commandes */
  .cmd-filters{display:flex;gap:.7rem;margin-bottom:1.2rem;flex-wrap:wrap;align-items:center;}
  .cmd-filters input,.cmd-filters select{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:10px;padding:.55rem .9rem;color:#f7efe1;font-family:inherit;font-size:.9rem;}
  .btn-export{padding:.55rem 1rem;border-radius:10px;border:1px solid rgba(238,195,123,.3);background:rgba(238,195,123,.1);color:#eec37b;cursor:pointer;font-weight:700;font-family:inherit;font-size:.88rem;}

  .commande-card{background:linear-gradient(180deg,rgba(255,255,255,.055),rgba(255,255,255,.03));border:1px solid rgba(255,255,255,.1);border-radius:18px;padding:1.1rem 1.3rem;margin-bottom:.8rem;cursor:pointer;transition:border .15s;}
  .commande-card:hover{border-color:rgba(238,195,123,.3);}
  .commande-card.expanded{border-color:rgba(238,195,123,.4);}
  .cmd-row{display:flex;align-items:center;justify-content:space-between;gap:1rem;flex-wrap:wrap;}
  .cmd-num{font-weight:900;font-size:1.05rem;color:#eec37b;}
  .cmd-client{font-weight:700;}
  .cmd-heure{color:#c9bea9;font-size:.88rem;}
  .cmd-total{font-weight:900;font-size:1.05rem;}
  .cmd-detail{margin-top:.9rem;padding-top:.9rem;border-top:1px solid rgba(255,255,255,.07);display:none;}
  .commande-card.expanded .cmd-detail{display:block;}
  .cmd-item-line{padding:.3rem 0;font-size:.9rem;color:#efe4d3;}
  .cmd-item-detail{font-size:.8rem;color:#c9bea9;margin-left:1rem;}
  .cmd-note{margin-top:.6rem;background:rgba(255,255,255,.04);border-radius:8px;padding:.5rem .8rem;font-size:.85rem;color:#c9bea9;}

  /* Éditeur menu */
  .menu-editor-section{margin-bottom:2rem;}
  .menu-editor-section h3{font-size:1.2rem;font-weight:900;color:#eec37b;margin:0 0 .8rem;letter-spacing:-.02em;}
  .editor-grid{display:grid;gap:.6rem;}
  .editor-item{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:.9rem 1.1rem;display:grid;grid-template-columns:2fr 1fr 1fr 1fr auto;gap:.6rem;align-items:center;}
  .editor-item-nom{font-weight:700;font-size:.9rem;}
  .editor-item input{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);border-radius:8px;padding:.4rem .6rem;color:#f7efe1;font-family:inherit;font-size:.88rem;width:100%;box-sizing:border-box;}
  .editor-item label{font-size:.75rem;color:#c9bea9;display:block;margin-bottom:.2rem;}
  .btn-save-item{padding:.4rem .8rem;border-radius:8px;border:none;background:linear-gradient(180deg,#b23a16,#8c260d);color:#fff;font-weight:800;font-family:inherit;font-size:.8rem;cursor:pointer;white-space:nowrap;}
  .save-ok{color:#4ade80;font-size:.8rem;opacity:0;transition:opacity .3s;}
  .save-ok.show{opacity:1;}

  /* Sauces / boissons éditeur */
  .tags-editor{display:flex;flex-wrap:wrap;gap:.5rem;margin-bottom:.8rem;}
  .tag-item{display:flex;align-items:center;gap:.4rem;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);border-radius:8px;padding:.35rem .7rem;font-size:.88rem;}
  .tag-del{background:none;border:none;color:#fca5a5;cursor:pointer;font-size:.9rem;padding:0;line-height:1;}
  .add-tag-row{display:flex;gap:.6rem;align-items:center;}
  .add-tag-row input{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:8px;padding:.45rem .7rem;color:#f7efe1;font-family:inherit;font-size:.88rem;flex:1;}
  .btn-add-tag{padding:.45rem .9rem;border-radius:8px;border:none;background:rgba(238,195,123,.15);color:#eec37b;font-weight:800;font-family:inherit;font-size:.85rem;cursor:pointer;}

  .global-save-btn{margin-top:1.5rem;padding:.9rem 2rem;border-radius:14px;border:none;background:linear-gradient(180deg,#b23a16,#8c260d);color:#fff;font-weight:900;font-size:1rem;cursor:pointer;font-family:inherit;}
  .save-banner{background:rgba(74,222,128,.15);border:1px solid rgba(74,222,128,.3);color:#4ade80;padding:.75rem 1rem;border-radius:12px;margin-bottom:1rem;display:none;}
  .save-banner.show{display:block;}

  @media(max-width:760px){
    .stats-bar{grid-template-columns:1fr 1fr;}
    .editor-item{grid-template-columns:1fr 1fr;gap:.4rem;}
    .editor-item-nom{grid-column:1/-1;}
  }
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login-screen" id="login-screen">
  <div class="login-box">
    <div style="font-size:2.5rem;margin-bottom:.5rem">🔐</div>
    <h2>Administration<br><span style="color:#eec37b">L'Authentik</span></h2>
    <input type="password" id="login-input" placeholder="Mot de passe" onkeydown="if(event.key==='Enter')checkLogin()">
    <button onclick="checkLogin()">Accéder</button>
    <div class="login-error" id="login-error"></div>
  </div>
</div>

<div id="admin-content" style="display:none">
<div class="admin-wrap">
  <div class="admin-header">
    <div>
      <a href="index.html" style="color:#c9bea9;font-size:.85rem;font-weight:600">← Retour au site</a>
      <h1>🍽 Administration</h1>
    </div>
    <div class="admin-nav">
      <button class="tab-btn active" onclick="showTab('historique')">📋 Commandes du jour</button>
      <button class="tab-btn" onclick="showTab('historique-global')">🗂 Historique global</button>
      <button class="tab-btn" onclick="showTab('menu-editor')">✏️ Modifier le menu</button>
      <button class="tab-btn" onclick="showTab('options-editor')">⚙️ Sauces & Boissons</button>
      <button class="tab-btn" onclick="if(confirm(\'Réinitialiser toutes les données menu?\'))resetMenu()">🔄 Reset menu</button>
    </div>
  </div>

  <!-- STATS -->
  <div class="stats-bar" id="stats-bar"></div>

  <!-- TAB: COMMANDES DU JOUR -->
  <div class="tab-content active" id="tab-historique">
    <div class="cmd-filters">
      <input type="text" id="search-today" placeholder="Rechercher (nom, #numéro...)" oninput="renderCommandes('today')">
      <button class="btn-export" onclick="exportCSV('today')">⬇ Export CSV</button>
    </div>
    <div id="list-today"></div>
  </div>

  <!-- TAB: HISTORIQUE GLOBAL -->
  <div class="tab-content" id="tab-historique-global">
    <div class="cmd-filters">
      <input type="text" id="search-global" placeholder="Rechercher..." oninput="renderCommandes('global')">
      <input type="date" id="filter-date" onchange="renderCommandes('global')">
      <button class="btn-export" onclick="exportCSV('global')">⬇ Export CSV</button>
    </div>
    <div id="list-global"></div>
  </div>

  <!-- TAB: ÉDITEUR MENU -->
  <div class="tab-content" id="tab-menu-editor">
    <div class="save-banner" id="save-banner">✅ Modifications enregistrées !</div>
    <div id="menu-editor-body"></div>
    <button class="global-save-btn" onclick="sauvegarderMenu()">💾 Sauvegarder toutes les modifications</button>
  </div>

  <!-- TAB: SAUCES & BOISSONS -->
  <div class="tab-content" id="tab-options-editor">
    <div class="save-banner" id="save-banner-opts">✅ Options enregistrées !</div>

    <div class="menu-editor-section">
      <h3>Sauces</h3>
      <div class="tags-editor" id="sauces-tags"></div>
      <div class="add-tag-row">
        <input type="text" id="new-sauce" placeholder="Nouvelle sauce...">
        <button class="btn-add-tag" onclick="addTag('sauce')">+ Ajouter</button>
      </div>
    </div>

    <div class="menu-editor-section">
      <h3>Boissons</h3>
      <div class="tags-editor" id="boissons-tags"></div>
      <div class="add-tag-row">
        <input type="text" id="new-boisson-nom" placeholder="Nom boisson..." style="flex:2">
        <input type="number" id="new-boisson-prix" placeholder="Prix €" step="0.5" min="0" style="flex:1">
        <button class="btn-add-tag" onclick="addTag('boisson')">+ Ajouter</button>
      </div>
    </div>

    <div class="menu-editor-section">
      <h3>Crudités</h3>
      <div class="tags-editor" id="crudites-tags"></div>
      <div class="add-tag-row">
        <input type="text" id="new-crudite" placeholder="Nouvelle crudité...">
        <button class="btn-add-tag" onclick="addTag('crudite')">+ Ajouter</button>
      </div>
    </div>

    <button class="global-save-btn" onclick="sauvegarderOptions()">💾 Sauvegarder</button>
  </div>

</div><!-- /admin-wrap -->
</div><!-- /admin-content -->

<script src="assets/js/menu-data.js"></script>
<script>
const ADMIN_PWD = 'Lauthentik@2025';

// ---- Auth ----
function checkLogin() {
  const val = document.getElementById('login-input').value;
  if (val === ADMIN_PWD) {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('admin-content').style.display = 'block';
    initAdmin();
  } else {
    document.getElementById('login-error').textContent = 'Mot de passe incorrect.';
  }
}
document.getElementById('login-input').addEventListener('keydown', e => { if(e.key==='Enter') checkLogin(); });

// ---- Tabs ----
function showTab(id) {
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-'+id).classList.add('active');
  event.target.classList.add('active');
}

// ---- Init ----
function initAdmin() {
  renderStats();
  renderCommandes('today');
  renderCommandes('global');
  renderMenuEditor();
  renderOptionsEditor();
}

// ---- Stats ----
function renderStats() {
  const hist = getHistorique();
  const today = new Date().toISOString().slice(0,10);
  const todayOrders = hist.filter(c => c.timestamp && c.timestamp.slice(0,10) === today);
  const totalToday = todayOrders.reduce((s,c) => s + (c.total||0), 0);
  const totalGlobal = hist.reduce((s,c) => s + (c.total||0), 0);
  
  document.getElementById('stats-bar').innerHTML = `
    <div class="stat-card"><div class="stat-val">${todayOrders.length}</div><div class="stat-label">Commandes aujourd'hui</div></div>
    <div class="stat-card"><div class="stat-val">${totalToday.toFixed(2)} €</div><div class="stat-label">CA aujourd'hui</div></div>
    <div class="stat-card"><div class="stat-val">${hist.length}</div><div class="stat-label">Commandes totales</div></div>
    <div class="stat-card"><div class="stat-val">${totalGlobal.toFixed(2)} €</div><div class="stat-label">CA total</div></div>
  `;
}

// ---- Historique ----
function getHistorique() {
  try { return JSON.parse(localStorage.getItem('lauthentik_historique') || '[]'); } catch(e) { return []; }
}

function renderCommandes(mode) {
  const hist = getHistorique();
  const today = new Date().toISOString().slice(0,10);
  const search = document.getElementById(mode === 'today' ? 'search-today' : 'search-global')?.value.toLowerCase() || '';
  const filterDate = document.getElementById('filter-date')?.value || '';
  const container = document.getElementById(mode === 'today' ? 'list-today' : 'list-global');

  let filtered = hist;
  if (mode === 'today') filtered = filtered.filter(c => c.timestamp && c.timestamp.slice(0,10) === today);
  if (filterDate) filtered = filtered.filter(c => c.timestamp && c.timestamp.slice(0,10) === filterDate);
  if (search) filtered = filtered.filter(c =>
    c.client_nom?.toLowerCase().includes(search) ||
    c.numero?.includes(search) ||
    JSON.stringify(c.items).toLowerCase().includes(search)
  );

  if (filtered.length === 0) {
    container.innerHTML = `<div style="text-align:center;color:#c9bea9;padding:2rem">Aucune commande${mode==='today'?' aujourd\'hui':''}</div>`;
    return;
  }

  container.innerHTML = filtered.map((c, i) => `
    <div class="commande-card" onclick="toggleCmd(this)">
      <div class="cmd-row">
        <span class="cmd-num">#${c.numero || '?'}</span>
        <span class="cmd-client">${c.client_nom || '—'}</span>
        <span class="cmd-heure">${c.heure || ''} — ${c.date || ''}</span>
        <span class="cmd-total">${(c.total||0).toFixed(2)} €</span>
        <span style="color:#c9bea9;font-size:.8rem">▼</span>
      </div>
      <div class="cmd-detail">
        ${(c.items||[]).map(item => `
          <div class="cmd-item-line">
            ${item.qte||1}× ${item.nom} — <span style="color:#eec37b">${((item.prix||0)*(item.qte||1)).toFixed(2)} €</span>
            ${item.detail ? `<div class="cmd-item-detail">${item.detail}</div>` : ''}
          </div>
        `).join('')}
        ${c.client_tel ? `<div class="cmd-item-detail" style="margin-top:.4rem">📞 ${c.client_tel}</div>` : ''}
        ${c.note ? `<div class="cmd-note">📝 ${c.note}</div>` : ''}
      </div>
    </div>
  `).join('');
}

function toggleCmd(el) {
  el.classList.toggle('expanded');
}

// ---- Export CSV ----
function exportCSV(mode) {
  const hist = getHistorique();
  const today = new Date().toISOString().slice(0,10);
  let data = mode === 'today' ? hist.filter(c => c.timestamp?.slice(0,10) === today) : hist;
  
  const rows = [['Numéro','Date','Heure','Client','Téléphone','Commande','Total','Note']];
  data.forEach(c => {
    const items = (c.items||[]).map(i => `${i.qte||1}x ${i.nom}${i.detail?' ('+i.detail+')':''}`).join('; ');
    rows.push([c.numero||'',c.date||'',c.heure||'',c.client_nom||'',c.client_tel||'',items,(c.total||0).toFixed(2),c.note||'']);
  });
  
  const csv = rows.map(r => r.map(v => `"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob = new Blob(['\ufeff'+csv], {type:'text/csv;charset=utf-8'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `commandes_lauthentik_${today}.csv`;
  a.click();
}

// ---- Éditeur menu ----
let editData = null;

function renderMenuEditor() {
  editData = JSON.parse(JSON.stringify(getMenuData()));
  const container = document.getElementById('menu-editor-body');
  let html = '';

  for (const [catKey, cat] of Object.entries(editData.categories)) {
    html += `<div class="menu-editor-section">
      <h3>${cat.label}</h3>
      <div class="editor-grid">`;
    
    cat.items.forEach((item, idx) => {
      const p = item.prix !== null && item.prix !== undefined ? item.prix : '';
      const pf = item.avecFrites || '';
      const pm = item.menu || '';
      html += `
        <div class="editor-item" data-cat="${catKey}" data-idx="${idx}">
          <div class="editor-item-nom">${item.nom}</div>
          <div>
            <label>Prix seul (€)</label>
            <input type="number" step="0.5" min="0" class="ed-prix" value="${p}" placeholder="—">
          </div>
          <div>
            <label>Avec frites (€)</label>
            <input type="number" step="0.5" min="0" class="ed-frites" value="${pf}" placeholder="—">
          </div>
          <div>
            <label>Menu complet (€)</label>
            <input type="number" step="0.5" min="0" class="ed-menu" value="${pm}" placeholder="—">
          </div>
          <span class="save-ok" id="ok-${catKey}-${idx}">✓</span>
        </div>`;
    });
    
    html += '</div></div>';
  }

  container.innerHTML = html;
}

function sauvegarderMenu() {
  document.querySelectorAll('.editor-item').forEach(el => {
    const cat = el.dataset.cat;
    const idx = parseInt(el.dataset.idx);
    const prix = parseFloat(el.querySelector('.ed-prix').value) || null;
    const frites = parseFloat(el.querySelector('.ed-frites').value) || null;
    const menu = parseFloat(el.querySelector('.ed-menu').value) || null;
    editData.categories[cat].items[idx].prix = prix;
    editData.categories[cat].items[idx].avecFrites = frites;
    editData.categories[cat].items[idx].menu = menu;
  });
  saveMenuData(editData);
  const banner = document.getElementById('save-banner');
  banner.classList.add('show');
  setTimeout(() => banner.classList.remove('show'), 3000);
}

function resetMenu() {
  localStorage.removeItem('lauthentik_menu_data');
  renderMenuEditor();
  renderOptionsEditor();
  alert('Menu réinitialisé aux valeurs par défaut.');
}

// ---- Éditeur options ----
let optsData = null;

function renderOptionsEditor() {
  optsData = JSON.parse(JSON.stringify(getMenuData()));
  
  // Sauces
  document.getElementById('sauces-tags').innerHTML = optsData.sauces.map((s,i) => `
    <div class="tag-item">${s} <button class="tag-del" onclick="removeTag('sauce',${i})">✕</button></div>
  `).join('');
  
  // Boissons
  document.getElementById('boissons-tags').innerHTML = optsData.boissons.map((b,i) => `
    <div class="tag-item">${b.nom} — ${b.prix.toFixed(2)}€ <button class="tag-del" onclick="removeTag('boisson',${i})">✕</button></div>
  `).join('');
  
  // Crudités
  document.getElementById('crudites-tags').innerHTML = optsData.crudites.map((c,i) => `
    <div class="tag-item">${c} <button class="tag-del" onclick="removeTag('crudite',${i})">✕</button></div>
  `).join('');
}

function removeTag(type, idx) {
  if (type === 'sauce') optsData.sauces.splice(idx, 1);
  else if (type === 'boisson') optsData.boissons.splice(idx, 1);
  else if (type === 'crudite') optsData.crudites.splice(idx, 1);
  renderOptionsEditor();
}

function addTag(type) {
  if (type === 'sauce') {
    const val = document.getElementById('new-sauce').value.trim();
    if (val) { optsData.sauces.push(val); document.getElementById('new-sauce').value = ''; }
  } else if (type === 'boisson') {
    const nom = document.getElementById('new-boisson-nom').value.trim();
    const prix = parseFloat(document.getElementById('new-boisson-prix').value) || 1.5;
    if (nom) {
      optsData.boissons.push({ nom, prix });
      document.getElementById('new-boisson-nom').value = '';
      document.getElementById('new-boisson-prix').value = '';
    }
  } else if (type === 'crudite') {
    const val = document.getElementById('new-crudite').value.trim();
    if (val) { optsData.crudites.push(val); document.getElementById('new-crudite').value = ''; }
  }
  renderOptionsEditor();
}

function sauvegarderOptions() {
  const current = JSON.parse(JSON.stringify(getMenuData()));
  current.sauces = optsData.sauces;
  current.boissons = optsData.boissons;
  current.crudites = optsData.crudites;
  saveMenuData(current);
  const banner = document.getElementById('save-banner-opts');
  banner.classList.add('show');
  setTimeout(() => banner.classList.remove('show'), 3000);
}
</script>
</body>
</html>
